<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      // On page load or when changing themes, best to add inline in `head` to avoid FOUC
      if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
      } else {
        document.documentElement.classList.remove('dark');
      }
    </script>
    <!-- Primary Meta Tags -->
    <title>Bukananko | Frontend Developer & Software Engineer</title>
    <meta name="title" content="Bukananko | Frontend Developer & Software Engineer" />
    <meta name="description" content="Professional portfolio of Anko, a Frontend Developer specialized in building high-performance, scalable, and visually stunning web applications using modern technologies." />
    <meta name="keywords" content="bukananko, Frontend Developer, Software Engineer, Vue.js, React, TypeScript, Web Development, Portfolio, UI/UX" />
    <meta name="author" content="bukananko" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <meta name="theme-color" content="#0f172a" />
    <link rel="canonical" href="https://bukananko.github.io/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://bukananko.github.io/" />

    <meta property="og:description" content="Explore the professional portfolio of Anko. Specialized in modern frontend engineering and creative web solutions." />

    <meta name="color-scheme" content="dark light" />
  </head>
